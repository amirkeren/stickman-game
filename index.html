<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stickman Fighter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; touch-action: none; -webkit-user-select: none; user-select: none; }
canvas { display: block; touch-action: none; }

/* ── UI Overlay ── */
#ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
#ui > div { pointer-events: auto; }

/* ── Start Screen ── */
#start-screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.85);
  z-index: 10;
}
#start-screen h1 {
  font-size: 64px; color: #fff; text-shadow: 0 0 30px #f44, 0 0 60px #f22;
  letter-spacing: 6px; margin-bottom: 20px;
}
#start-screen .subtitle { font-size: 18px; color: #aaa; margin-bottom: 40px; }
#start-screen .prompt {
  font-size: 22px; color: #fff;
  animation: blink 1.2s ease-in-out infinite;
}
#start-screen .controls-info {
  margin-top: 40px; color: #888; font-size: 14px; text-align: center; line-height: 2;
}
#start-screen .controls-info span { color: #fff; background: #333; padding: 2px 8px; border-radius: 4px; font-size: 13px; }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* ── HUD ── */
#hud {
  position: absolute; top: 0; left: 0; width: 100%;
  padding: 15px 30px;
  display: none;
}
.health-container {
  position: absolute; top: 15px; width: calc(50% - 80px); height: 28px;
  background: #222; border: 2px solid #555; border-radius: 4px; overflow: hidden;
}
#p1-health-container { left: 30px; }
#p2-health-container { right: 30px; }
.health-bar {
  height: 100%; transition: width 0.3s ease;
  border-radius: 2px;
}
#p1-health { width: 100%; background: linear-gradient(180deg, #4f4, #2a2); float: right; }
#p2-health { width: 100%; background: linear-gradient(180deg, #f44, #a22); float: left; }
.player-label {
  position: absolute; top: 48px; font-size: 14px; color: #ccc; font-weight: bold;
}
#p1-label { left: 30px; }
#p2-label { right: 30px; }
#round-display {
  position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  font-size: 18px; color: #ff0; font-weight: bold;
}
#timer-display {
  position: absolute; top: 34px; left: 50%; transform: translateX(-50%);
  font-size: 36px; color: #fff; font-weight: bold;
  text-shadow: 0 0 10px rgba(255,255,255,0.5);
}
#round-wins {
  position: absolute; top: 68px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 30px; font-size: 13px; color: #aaa;
}
.win-dots { display: flex; gap: 4px; margin-left: 6px; }
.win-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: #444; border: 1px solid #666;
}
.win-dot.won { background: #ff0; border-color: #ff0; }

/* ── Announcement Overlay ── */
#announcement {
  position: absolute; inset: 0;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  z-index: 5;
}
#announcement .text {
  font-size: 72px; font-weight: bold; color: #fff;
  text-shadow: 0 0 40px rgba(255,100,0,0.8), 0 0 80px rgba(255,50,0,0.4);
  animation: announceIn 0.3s ease-out;
}
#announcement .subtext {
  font-size: 24px; color: #ccc; margin-top: 10px;
}
@keyframes announceIn {
  from { transform: scale(2); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* ── Game Over ── */
#game-over {
  position: absolute; inset: 0;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.8);
  z-index: 10;
}
#game-over .result {
  font-size: 72px; font-weight: bold;
  text-shadow: 0 0 40px rgba(255,200,0,0.6);
}
#game-over .result.win { color: #4f4; }
#game-over .result.lose { color: #f44; }
#game-over .prompt {
  font-size: 22px; color: #fff; margin-top: 30px;
  animation: blink 1.2s ease-in-out infinite;
}

/* ── Touch Controls Overlay ── */
#touch-controls {
  display: none; position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 4;
}
#touch-controls .zone {
  position: absolute; top: 0; height: 100%; display: flex; align-items: flex-end;
  justify-content: center; padding-bottom: 30px;
}
#touch-controls .zone-left { left: 0; width: 50%; border-right: 1px solid rgba(255,255,255,0.06); }
#touch-controls .zone-right { right: 0; width: 50%; }
#touch-controls .zone-label {
  color: rgba(255,255,255,0.15); font-size: 14px; font-weight: bold;
  letter-spacing: 2px; text-transform: uppercase;
}
.touch-device #touch-controls { display: block; }
.touch-device .controls-info.keyboard { display: none; }
.touch-device .controls-info.touch { display: block !important; }
.controls-info.touch { display: none; color: #888; font-size: 14px; text-align: center; line-height: 2; margin-top: 40px; }
</style>
</head>
<body>

<div id="ui">
  <!-- Start Screen -->
  <div id="start-screen">
    <h1>STICKMAN FIGHTER</h1>
    <div class="subtitle">3D Fighting Game</div>
    <div class="prompt" id="start-prompt">Press ENTER to Start</div>
    <div class="controls-info keyboard">
      <span>A</span> <span>D</span> Move &nbsp;&nbsp;
      <span>W</span> Jump &nbsp;&nbsp;
      <span>J</span> Punch &nbsp;&nbsp;
      <span>K</span> Kick &nbsp;&nbsp;
      <span>L</span> Block
    </div>
    <div class="controls-info touch">
      Left side: drag to move &nbsp;&nbsp; Right side: tap = punch, hold = kick<br>
      Swipe up on right = jump &nbsp;&nbsp; Two fingers = block
    </div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="health-container" id="p1-health-container"><div class="health-bar" id="p1-health"></div></div>
    <div class="health-container" id="p2-health-container"><div class="health-bar" id="p2-health"></div></div>
    <div class="player-label" id="p1-label">PLAYER</div>
    <div class="player-label" id="p2-label">CPU</div>
    <div id="round-display">ROUND 1</div>
    <div id="timer-display">60</div>
    <div id="round-wins">
      <div>P1 <span class="win-dots" id="p1-dots"><span class="win-dot"></span><span class="win-dot"></span></span></div>
      <div>P2 <span class="win-dots" id="p2-dots"><span class="win-dot"></span><span class="win-dot"></span></span></div>
    </div>
  </div>

  <!-- Announcement Overlay -->
  <div id="announcement">
    <div class="text" id="announce-text"></div>
    <div class="subtext" id="announce-subtext"></div>
  </div>

  <!-- Game Over -->
  <div id="game-over">
    <div class="result" id="game-over-text"></div>
    <div class="prompt" id="gameover-prompt">Press ENTER to Restart</div>
  </div>

  <!-- Touch Controls Overlay -->
  <div id="touch-controls">
    <div class="zone zone-left"><div class="zone-label">MOVE</div></div>
    <div class="zone zone-right"><div class="zone-label">ATTACK</div></div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ════════════════════════════════════════════
// CONSTANTS & CONFIGURATION
// ════════════════════════════════════════════

const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

const ARENA_WIDTH = 9;
const GRAVITY = 28;
const JUMP_VELOCITY = 10;
const WALK_SPEED = 4.5;
const PUSH_APART_DIST = 0.7;
const ROUND_TIME = 60;
const ROUNDS_TO_WIN = 2;

const DAMAGE = { punch: 10, kick: 16 };
const BLOCK_REDUCTION = 0.35;
const HIT_STUN = 0.35;
const KNOCKBACK = { punch: 1.5, kick: 2.5 };
const HIT_RANGE = { punch: 0.9, kick: 1.2 };

const AI_CONFIG = {
  reactionTime: 0.25,
  aggression: 0.7,
  blockChance: 0.35,
  retreatChance: 0.35,
  walkSpeed: 3.5,
  attackRange: 2.0,
  decisionInterval: 0.3,
};

// ════════════════════════════════════════════
// THREE.JS SCENE SETUP
// ════════════════════════════════════════════

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a0a05);
scene.fog = new THREE.Fog(0x1a0a05, 25, 55);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2.8, 11);

const renderer = new THREE.WebGLRenderer({ antialias: !isTouchDevice });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, isTouchDevice ? 1.5 : 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = isTouchDevice ? THREE.PCFShadowMap : THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.prepend(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
scene.add(ambientLight);

const hemiLight = new THREE.HemisphereLight(0x6688cc, 0x443322, 0.4);
scene.add(hemiLight);

const dirLight = new THREE.DirectionalLight(0xffeedd, 1.0);
dirLight.position.set(5, 10, 7);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(isTouchDevice ? 512 : 1024, isTouchDevice ? 512 : 1024);
dirLight.shadow.camera.left = -12;
dirLight.shadow.camera.right = 12;
dirLight.shadow.camera.top = 8;
dirLight.shadow.camera.bottom = -2;
dirLight.shadow.camera.near = 1;
dirLight.shadow.camera.far = 25;
scene.add(dirLight);

// Arena base (hidden beneath textured floor)
const arenaGeo = new THREE.BoxGeometry(50, 0.5, 30);
const arenaMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 });
const arena = new THREE.Mesh(arenaGeo, arenaMat);
arena.position.y = -0.25;
arena.receiveShadow = true;
scene.add(arena);

// Floor surface with road texture (bottom ~35% of image)
const floorTexture = new THREE.TextureLoader().load('bg.png');
floorTexture.colorSpace = THREE.SRGBColorSpace;
floorTexture.offset.set(0, 0);
floorTexture.repeat.set(1, 0.35);
const floorGeo = new THREE.PlaneGeometry(50, 30);
const floorMat = new THREE.MeshStandardMaterial({ map: floorTexture, roughness: 0.7 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = 0.01;
floor.receiveShadow = true;
scene.add(floor);

// Backdrop with city/sky (upper ~65% of image)
const bgTexture = new THREE.TextureLoader().load('bg.png');
bgTexture.colorSpace = THREE.SRGBColorSpace;
bgTexture.offset.set(0, 0.3);
bgTexture.repeat.set(1, 0.7);
const backdropGeo = new THREE.PlaneGeometry(50, 16);
const backdropMat = new THREE.MeshBasicMaterial({ map: bgTexture, side: THREE.DoubleSide });
const backdrop = new THREE.Mesh(backdropGeo, backdropMat);
backdrop.position.set(0, 7, -5.5);
scene.add(backdrop);

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ════════════════════════════════════════════
// STICKMAN MODEL BUILDER
// ════════════════════════════════════════════

function createStickman(color) {
  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.6, metalness: 0.1 });
  const jointMat = new THREE.MeshStandardMaterial({ color, roughness: 0.5, metalness: 0.2 });

  function cyl(radius, height) {
    return new THREE.CylinderGeometry(radius, radius, height, 8);
  }
  function sphere(radius) {
    return new THREE.SphereGeometry(radius, 12, 8);
  }

  function makeLimb(radius, length, parentGroup, offsetY, jointRadius) {
    const pivot = new THREE.Group();
    if (jointRadius) {
      const jm = new THREE.Mesh(sphere(jointRadius), jointMat);
      jm.castShadow = true;
      pivot.add(jm);
    }
    const mesh = new THREE.Mesh(cyl(radius, length), mat);
    mesh.position.y = offsetY;
    mesh.castShadow = true;
    pivot.add(mesh);
    parentGroup.add(pivot);
    return pivot;
  }

  const root = new THREE.Group();

  // Hips
  const hips = new THREE.Group();
  hips.position.y = 0.95;
  root.add(hips);

  // Torso
  const torsoMesh = new THREE.Mesh(cyl(0.1, 0.55), mat);
  torsoMesh.position.y = 0.275;
  torsoMesh.castShadow = true;
  hips.add(torsoMesh);

  // Chest
  const chest = new THREE.Group();
  chest.position.y = 0.55;
  hips.add(chest);

  // Neck + Head
  const neckMesh = new THREE.Mesh(cyl(0.04, 0.1), mat);
  neckMesh.position.y = 0.05;
  neckMesh.castShadow = true;
  chest.add(neckMesh);

  const headMesh = new THREE.Mesh(sphere(0.2), mat);
  headMesh.position.y = 0.3;
  headMesh.castShadow = true;
  chest.add(headMesh);

  // Arms
  function makeArm(side) {
    const shoulderX = side * 0.22;
    const shoulder = new THREE.Group();
    shoulder.position.set(shoulderX, 0, 0);
    chest.add(shoulder);

    const sjm = new THREE.Mesh(sphere(0.065), jointMat);
    sjm.castShadow = true;
    shoulder.add(sjm);

    const upperArm = new THREE.Mesh(cyl(0.045, 0.38), mat);
    upperArm.position.y = -0.19;
    upperArm.castShadow = true;
    shoulder.add(upperArm);

    const elbow = new THREE.Group();
    elbow.position.y = -0.38;
    shoulder.add(elbow);

    const ejm = new THREE.Mesh(sphere(0.05), jointMat);
    ejm.castShadow = true;
    elbow.add(ejm);

    const forearm = new THREE.Mesh(cyl(0.04, 0.34), mat);
    forearm.position.y = -0.17;
    forearm.castShadow = true;
    elbow.add(forearm);

    const hand = new THREE.Mesh(sphere(0.055), mat);
    hand.position.y = -0.34;
    hand.castShadow = true;
    elbow.add(hand);

    return { shoulder, elbow, hand };
  }

  const leftArm = makeArm(-1);
  const rightArm = makeArm(1);

  // Legs
  function makeLeg(side) {
    const hipJoint = new THREE.Group();
    hipJoint.position.set(side * 0.12, 0, 0);
    hips.add(hipJoint);

    const hjm = new THREE.Mesh(sphere(0.07), jointMat);
    hjm.castShadow = true;
    hipJoint.add(hjm);

    const upperLeg = new THREE.Mesh(cyl(0.055, 0.44), mat);
    upperLeg.position.y = -0.22;
    upperLeg.castShadow = true;
    hipJoint.add(upperLeg);

    const knee = new THREE.Group();
    knee.position.y = -0.44;
    hipJoint.add(knee);

    const kjm = new THREE.Mesh(sphere(0.055), jointMat);
    kjm.castShadow = true;
    knee.add(kjm);

    const lowerLeg = new THREE.Mesh(cyl(0.045, 0.4), mat);
    lowerLeg.position.y = -0.2;
    lowerLeg.castShadow = true;
    knee.add(lowerLeg);

    const foot = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.04, 0.18), mat);
    foot.position.set(0, -0.42, 0.04);
    foot.castShadow = true;
    knee.add(foot);

    return { hip: hipJoint, knee, foot };
  }

  const leftLeg = makeLeg(-1);
  const rightLeg = makeLeg(1);

  return {
    root,
    parts: {
      hips, chest, headMesh,
      leftShoulder: leftArm.shoulder, leftElbow: leftArm.elbow, leftHand: leftArm.hand,
      rightShoulder: rightArm.shoulder, rightElbow: rightArm.elbow, rightHand: rightArm.hand,
      leftHip: leftLeg.hip, leftKnee: leftLeg.knee, leftFoot: leftLeg.foot,
      rightHip: rightLeg.hip, rightKnee: rightLeg.knee, rightFoot: rightLeg.foot,
    }
  };
}

// ════════════════════════════════════════════
// ANIMATION SYSTEM
// ════════════════════════════════════════════

const POSES = {
  idle: {
    leftShoulder:  { x: 0.15, z: 0.4 },
    leftElbow:     { x: -0.5 },
    rightShoulder: { x: -0.6, z: -0.5 },
    rightElbow:    { x: -1.2 },
    leftHip:       { x: 0.05 },
    leftKnee:      { x: 0 },
    rightHip:      { x: -0.15 },
    rightKnee:     { x: 0.3 },
    chest:         { x: -0.05, y: 0.1 },
  },
  walk: {
    // Dynamic — computed per frame based on walk cycle
  },
  punch: [
    { t: 0.0, rightShoulder: { x: -0.6, z: -0.5 }, rightElbow: { x: -1.2 } },
    { t: 0.08, rightShoulder: { x: -1.55, z: -0.1 }, rightElbow: { x: -0.1 } },
    { t: 0.22, rightShoulder: { x: -1.55, z: -0.1 }, rightElbow: { x: -0.1 } },
    { t: 0.35, rightShoulder: { x: -0.6, z: -0.5 }, rightElbow: { x: -1.2 } },
  ],
  kick: [
    { t: 0.0, rightHip: { x: -0.15 }, rightKnee: { x: 0.3 } },
    { t: 0.1, rightHip: { x: -0.8 }, rightKnee: { x: 0.8 } },
    { t: 0.2, rightHip: { x: -1.4 }, rightKnee: { x: 0.05 } },
    { t: 0.35, rightHip: { x: -1.4 }, rightKnee: { x: 0.05 } },
    { t: 0.5, rightHip: { x: -0.15 }, rightKnee: { x: 0.3 } },
  ],
  block: {
    leftShoulder:  { x: -1.2, z: 0.6 },
    leftElbow:     { x: -1.5 },
    rightShoulder: { x: -1.2, z: -0.6 },
    rightElbow:    { x: -1.5 },
    chest:         { x: 0.1 },
  },
  hitReact: {
    chest: { x: 0.25 },
    leftShoulder: { x: 0.3, z: 0.3 },
    rightShoulder: { x: 0.3, z: -0.3 },
    leftElbow: { x: -0.2 },
    rightElbow: { x: -0.2 },
  },
  victory: {
    leftShoulder:  { x: -2.8, z: 0.3 },
    leftElbow:     { x: -0.3 },
    rightShoulder: { x: -2.8, z: -0.3 },
    rightElbow:    { x: -0.3 },
    chest:         { x: -0.15 },
  },
  defeat: {
    leftShoulder:  { x: 0.3, z: 0.2 },
    leftElbow:     { x: -0.1 },
    rightShoulder: { x: 0.3, z: -0.2 },
    rightElbow:    { x: -0.1 },
    leftHip:       { x: 0.3 },
    leftKnee:      { x: 0.5 },
    rightHip:      { x: 0.3 },
    rightKnee:     { x: 0.5 },
    chest:         { x: 0.4 },
    hips:          { posY: -0.4 },
  },
};

const ATTACK_INFO = {
  punch: { hitTime: 0.1, duration: 0.35, type: 'punch' },
  kick:  { hitTime: 0.22, duration: 0.5, type: 'kick' },
};

const JOINT_NAMES = [
  'leftShoulder', 'leftElbow', 'rightShoulder', 'rightElbow',
  'leftHip', 'leftKnee', 'rightHip', 'rightKnee', 'chest'
];

function lerpAngle(current, target, factor) {
  return current + (target - current) * factor;
}

function getAttackKeyframe(attackType, time) {
  const frames = POSES[attackType];
  let a = frames[0], b = frames[0];
  for (let i = 0; i < frames.length - 1; i++) {
    if (time >= frames[i].t && time <= frames[i + 1].t) {
      a = frames[i];
      b = frames[i + 1];
      break;
    }
    if (i === frames.length - 2) {
      a = b = frames[frames.length - 1];
    }
  }
  const range = b.t - a.t;
  const frac = range > 0 ? (time - a.t) / range : 1;
  const result = {};
  const keys = new Set([...Object.keys(a), ...Object.keys(b)]);
  keys.delete('t');
  for (const k of keys) {
    const av = a[k] || {};
    const bv = b[k] || {};
    result[k] = {
      x: (av.x || 0) + ((bv.x || 0) - (av.x || 0)) * frac,
      y: (av.y || 0) + ((bv.y || 0) - (av.y || 0)) * frac,
      z: (av.z || 0) + ((bv.z || 0) - (av.z || 0)) * frac,
    };
  }
  return result;
}

function updateAnimation(fighter, dt) {
  const parts = fighter.model.parts;
  const anim = fighter.anim;
  const time = performance.now() / 1000;
  let targets = {};
  const lerpSpeed = anim.isAttacking ? 18 : 10;

  if (anim.currentAnim === 'punch' || anim.currentAnim === 'kick') {
    // Attack animation
    anim.animTime += dt;
    const info = ATTACK_INFO[anim.currentAnim];
    const attackTargets = getAttackKeyframe(anim.currentAnim, anim.animTime);
    // Merge with idle for non-specified joints
    for (const j of JOINT_NAMES) {
      targets[j] = attackTargets[j] || POSES.idle[j] || { x: 0, y: 0, z: 0 };
    }
    if (anim.animTime >= info.duration) {
      anim.currentAnim = 'idle';
      anim.isAttacking = false;
      anim.hasHitThisSwing = false;
    }
  } else if (anim.currentAnim === 'block') {
    for (const j of JOINT_NAMES) {
      targets[j] = POSES.block[j] || POSES.idle[j] || { x: 0, y: 0, z: 0 };
    }
  } else if (anim.currentAnim === 'hitReact') {
    anim.animTime += dt;
    for (const j of JOINT_NAMES) {
      targets[j] = POSES.hitReact[j] || POSES.idle[j] || { x: 0, y: 0, z: 0 };
    }
    if (anim.animTime >= 0.3) {
      anim.currentAnim = 'idle';
    }
  } else if (anim.currentAnim === 'victory') {
    for (const j of JOINT_NAMES) {
      targets[j] = POSES.victory[j] || POSES.idle[j] || { x: 0, y: 0, z: 0 };
    }
  } else if (anim.currentAnim === 'defeat') {
    for (const j of JOINT_NAMES) {
      targets[j] = POSES.defeat[j] || POSES.idle[j] || { x: 0, y: 0, z: 0 };
    }
    // Lower hips
    const defeatY = POSES.defeat.hips?.posY || 0;
    parts.hips.position.y = lerpAngle(parts.hips.position.y, 0.95 + defeatY, 5 * dt);
  } else {
    // Idle or walking
    const isMoving = Math.abs(fighter.velocity.x) > 0.5;
    if (isMoving) {
      const walkPhase = time * 8;
      const swing = Math.sin(walkPhase);
      targets.leftHip = { x: swing * 0.5 };
      targets.rightHip = { x: -swing * 0.5 };
      targets.leftKnee = { x: Math.max(0, -swing) * 0.6 };
      targets.rightKnee = { x: Math.max(0, swing) * 0.6 };
      targets.leftShoulder = { x: -swing * 0.3, z: 0.4 };
      targets.rightShoulder = { x: swing * 0.3, z: -0.5 };
      targets.leftElbow = { x: -0.5 };
      targets.rightElbow = { x: -1.0 };
      targets.chest = POSES.idle.chest || { x: 0 };
    } else {
      for (const j of JOINT_NAMES) {
        targets[j] = POSES.idle[j] || { x: 0, y: 0, z: 0 };
      }
    }
  }

  // Apply idle bob
  if (anim.currentAnim === 'idle' || anim.currentAnim === 'block') {
    const bob = Math.sin(time * 3) * 0.02;
    parts.hips.position.y = lerpAngle(parts.hips.position.y, 0.95 + bob, 8 * dt);
  } else if (anim.currentAnim !== 'defeat') {
    parts.hips.position.y = lerpAngle(parts.hips.position.y, 0.95, 8 * dt);
  }

  // Lerp all joints
  for (const j of JOINT_NAMES) {
    const part = parts[j];
    if (!part || !targets[j]) continue;
    const t = targets[j];
    part.rotation.x = lerpAngle(part.rotation.x, t.x || 0, lerpSpeed * dt);
    part.rotation.y = lerpAngle(part.rotation.y, t.y || 0, lerpSpeed * dt);
    part.rotation.z = lerpAngle(part.rotation.z, t.z || 0, lerpSpeed * dt);
  }
}

// INPUT HANDLER
// ════════════════════════════════════════════

const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
    e.preventDefault();
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ════════════════════════════════════════════
// TOUCH INPUT
// ════════════════════════════════════════════

if (isTouchDevice) {
  document.body.classList.add('touch-device');
  document.getElementById('start-prompt').textContent = 'Tap to Start';
  document.getElementById('gameover-prompt').textContent = 'Tap to Restart';
}

const touchState = {
  moveId: null,       // touch identifier for movement (left half)
  moveStartX: 0,
  moveDir: 0,
  attackId: null,     // touch identifier for attack (right half)
  attackStartTime: 0,
  attackStartY: 0,
  blocking: false,
  pendingPunch: false,
  pendingKick: false,
  pendingJump: false,
};

const TOUCH_MOVE_THRESHOLD = 15;  // px drag to start moving
const TOUCH_KICK_THRESHOLD = 200; // ms hold to kick instead of punch
const TOUCH_SWIPE_UP_THRESHOLD = 50; // px upward swipe to jump

function getTouchHalf(touch) {
  return touch.clientX < window.innerWidth / 2 ? 'left' : 'right';
}

window.addEventListener('touchstart', e => {
  e.preventDefault();
  ensureAudio();

  // Two or more fingers anywhere = block
  if (e.touches.length >= 2) {
    touchState.blocking = true;
    return;
  }

  for (const touch of e.changedTouches) {
    const half = getTouchHalf(touch);
    if (half === 'left' && touchState.moveId === null) {
      touchState.moveId = touch.identifier;
      touchState.moveStartX = touch.clientX;
      touchState.moveDir = 0;
    } else if (half === 'right' && touchState.attackId === null) {
      touchState.attackId = touch.identifier;
      touchState.attackStartTime = performance.now();
      touchState.attackStartY = touch.clientY;
    }
  }

  // Handle menu/game-over tap
  if (gameState.current === 'MENU' || gameState.current === 'GAME_OVER') {
    handleEnter();
  }
}, { passive: false });

window.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const touch of e.changedTouches) {
    if (touch.identifier === touchState.moveId) {
      const dx = touch.clientX - touchState.moveStartX;
      if (Math.abs(dx) > TOUCH_MOVE_THRESHOLD) {
        touchState.moveDir = dx > 0 ? 1 : -1;
      } else {
        touchState.moveDir = 0;
      }
    }
  }
}, { passive: false });

window.addEventListener('touchend', e => {
  e.preventDefault();

  // Check if blocking should stop
  if (e.touches.length < 2) {
    touchState.blocking = false;
  }

  for (const touch of e.changedTouches) {
    if (touch.identifier === touchState.moveId) {
      touchState.moveId = null;
      touchState.moveDir = 0;
    }
    if (touch.identifier === touchState.attackId) {
      const dt = performance.now() - touchState.attackStartTime;
      const dy = touch.clientY - touchState.attackStartY;

      if (dy < -TOUCH_SWIPE_UP_THRESHOLD) {
        // Swipe up = jump
        touchState.pendingJump = true;
      } else if (dt >= TOUCH_KICK_THRESHOLD) {
        // Long press = kick
        touchState.pendingKick = true;
      } else {
        // Quick tap = punch
        touchState.pendingPunch = true;
      }
      touchState.attackId = null;
    }
  }
}, { passive: false });

window.addEventListener('touchcancel', e => {
  touchState.moveId = null;
  touchState.moveDir = 0;
  touchState.attackId = null;
  touchState.blocking = false;
});

// ════════════════════════════════════════════
// FIGHTER STATE
// ════════════════════════════════════════════

function createFighter(model, startX, isPlayer) {
  scene.add(model.root);
  return {
    model,
    isPlayer,
    health: 100,
    maxHealth: 100,
    position: { x: startX, y: 0 },
    velocity: { x: 0, y: 0 },
    isGrounded: true,
    isBlocking: false,
    isStunned: false,
    stunTimer: 0,
    facingRight: startX < 0,
    anim: {
      currentAnim: 'idle',
      animTime: 0,
      isAttacking: false,
      hasHitThisSwing: false,
    },
    // AI state
    aiState: 'IDLE',
    aiTimer: 0,
    aiDecisionTimer: 0,
    aiBlockTimer: 0,
    aiReactTimer: -1,
  };
}

// ════════════════════════════════════════════
// COMBAT SYSTEM
// ════════════════════════════════════════════

const _tempVec = new THREE.Vector3();
const _tempVec2 = new THREE.Vector3();

function getWorldPos(part, vec) {
  part.getWorldPosition(vec);
  return vec;
}

function checkHit(attacker, defender) {
  if (attacker.anim.hasHitThisSwing) return;
  const info = ATTACK_INFO[attacker.anim.currentAnim];
  if (!info) return;
  if (attacker.anim.animTime < info.hitTime - 0.04 || attacker.anim.animTime > info.hitTime + 0.12) return;

  let attackPart;
  if (info.type === 'punch') {
    attackPart = attacker.model.parts.rightHand;
  } else {
    attackPart = attacker.model.parts.rightFoot;
  }

  getWorldPos(attackPart, _tempVec);
  getWorldPos(defender.model.parts.chest, _tempVec2);

  const dist = _tempVec.distanceTo(_tempVec2);
  if (dist < HIT_RANGE[info.type]) {
    applyHit(attacker, defender, info.type);
    attacker.anim.hasHitThisSwing = true;
  }
}

function applyHit(attacker, defender, type) {
  let damage = DAMAGE[type];
  let kb = KNOCKBACK[type];

  if (defender.isBlocking) {
    damage *= BLOCK_REDUCTION;
    kb *= 0.3;
    playSound('block');
  } else {
    defender.isStunned = true;
    defender.stunTimer = HIT_STUN;
    defender.anim.currentAnim = 'hitReact';
    defender.anim.animTime = 0;
    playSound(type === 'punch' ? 'punchHit' : 'kickHit');

    if (type === 'kick') {
      screenShake.intensity = 0.2;
    } else {
      screenShake.intensity = 0.08;
    }
  }

  defender.health = Math.max(0, defender.health - damage);

  const dir = defender.position.x > attacker.position.x ? 1 : -1;
  defender.velocity.x += dir * kb;

  // Particles
  getWorldPos(defender.model.parts.chest, _tempVec);
  spawnParticles(_tempVec.x, _tempVec.y, _tempVec.z, defender.isBlocking ? 0x4488ff : 0xff8800);
}

// ════════════════════════════════════════════
// AI CONTROLLER
// ════════════════════════════════════════════

function updateAI(ai, player, dt) {
  if (ai.isStunned || ai.anim.isAttacking) return;

  const dist = Math.abs(ai.position.x - player.position.x);

  // Reactive blocking
  if (player.anim.isAttacking && ai.aiReactTimer < 0) {
    ai.aiReactTimer = AI_CONFIG.reactionTime;
  }
  if (ai.aiReactTimer > 0) {
    ai.aiReactTimer -= dt;
    if (ai.aiReactTimer <= 0) {
      ai.aiReactTimer = -1;
      if (Math.random() < AI_CONFIG.blockChance && dist < AI_CONFIG.attackRange + 0.5) {
        ai.aiState = 'BLOCK';
        ai.aiBlockTimer = 0.3 + Math.random() * 0.4;
      }
    }
  }

  // Retreat and block timers run every frame (not gated by decision timer)
  if (ai.aiState === 'RETREAT') {
    ai.aiTimer -= dt;
    if (ai.aiTimer <= 0) ai.aiState = 'APPROACH';
  }
  if (ai.aiState === 'BLOCK') {
    ai.aiBlockTimer -= dt;
    if (ai.aiBlockTimer <= 0) ai.aiState = 'APPROACH';
  }

  // Decision timer gates state transitions for IDLE and APPROACH
  ai.aiDecisionTimer -= dt;
  if (ai.aiDecisionTimer > 0 && ai.aiState !== 'RETREAT' && ai.aiState !== 'BLOCK') return;
  ai.aiDecisionTimer = AI_CONFIG.decisionInterval + Math.random() * 0.1;

  switch (ai.aiState) {
    case 'IDLE':
      // Always approach — don't stay idle
      ai.aiState = 'APPROACH';
      break;

    case 'APPROACH':
      if (dist <= AI_CONFIG.attackRange) {
        ai.aiState = 'ATTACK';
      }
      break;

    case 'ATTACK':
      if (!ai.anim.isAttacking) {
        const type = Math.random() < 0.55 ? 'punch' : 'kick';
        startAttack(ai, type);
      }
      if (Math.random() < AI_CONFIG.retreatChance) {
        ai.aiState = 'RETREAT';
        ai.aiTimer = 0.3 + Math.random() * 0.4;
      } else {
        ai.aiState = 'APPROACH';
      }
      break;
  }

  // Movement
  ai.isBlocking = false;
  if (ai.aiState === 'BLOCK') {
    ai.velocity.x *= 0.8;
    ai.isBlocking = true;
    if (ai.anim.currentAnim !== 'block') ai.anim.currentAnim = 'block';
  } else if (ai.aiState === 'APPROACH') {
    const dir = player.position.x > ai.position.x ? 1 : -1;
    ai.velocity.x = dir * AI_CONFIG.walkSpeed;
  } else if (ai.aiState === 'RETREAT') {
    const dir = player.position.x > ai.position.x ? -1 : 1;
    ai.velocity.x = dir * AI_CONFIG.walkSpeed * 0.6;
  } else if (!ai.anim.isAttacking) {
    ai.velocity.x *= 0.8;
  }

  if (ai.anim.currentAnim === 'block' && ai.aiState !== 'BLOCK') {
    ai.anim.currentAnim = 'idle';
  }
}

// ════════════════════════════════════════════
// PLAYER INPUT PROCESSING
// ════════════════════════════════════════════

function updatePlayerInput(player) {
  if (player.isStunned) return;

  // Movement (keyboard + touch)
  let moveDir = 0;
  if (keys['KeyA'] || keys['ArrowLeft']) moveDir -= 1;
  if (keys['KeyD'] || keys['ArrowRight']) moveDir += 1;
  if (touchState.moveDir !== 0) moveDir = touchState.moveDir;

  // Block (keyboard or two-finger touch)
  player.isBlocking = false;
  if ((keys['KeyL'] || touchState.blocking) && !player.anim.isAttacking) {
    player.isBlocking = true;
    player.velocity.x *= 0.8;
    if (player.anim.currentAnim !== 'block') player.anim.currentAnim = 'block';
  } else {
    if (player.anim.currentAnim === 'block') player.anim.currentAnim = 'idle';
    if (!player.anim.isAttacking) {
      player.velocity.x = moveDir * WALK_SPEED;
    }
  }

  // Jump (keyboard or touch swipe-up)
  if ((keys['KeyW'] || keys['ArrowUp'] || touchState.pendingJump) && player.isGrounded && !player.anim.isAttacking) {
    player.velocity.y = JUMP_VELOCITY;
    player.isGrounded = false;
    touchState.pendingJump = false;
  }

  // Attacks (keyboard or touch)
  if ((keys['KeyJ'] || touchState.pendingPunch) && !player.anim.isAttacking && !player.isBlocking) {
    startAttack(player, 'punch');
    keys['KeyJ'] = false;
    touchState.pendingPunch = false;
  }
  if ((keys['KeyK'] || touchState.pendingKick) && !player.anim.isAttacking && !player.isBlocking) {
    startAttack(player, 'kick');
    keys['KeyK'] = false;
    touchState.pendingKick = false;
  }
}

function startAttack(fighter, type) {
  fighter.anim.currentAnim = type;
  fighter.anim.animTime = 0;
  fighter.anim.isAttacking = true;
  fighter.anim.hasHitThisSwing = false;
  fighter.isBlocking = false;
  playSound(type === 'punch' ? 'whoosh' : 'whoosh');
}

// ════════════════════════════════════════════
// PHYSICS
// ════════════════════════════════════════════

function updatePhysics(fighter, dt) {
  // Stun
  if (fighter.isStunned) {
    fighter.stunTimer -= dt;
    if (fighter.stunTimer <= 0) {
      fighter.isStunned = false;
      if (fighter.anim.currentAnim === 'hitReact') fighter.anim.currentAnim = 'idle';
    }
  }

  // Horizontal
  fighter.position.x += fighter.velocity.x * dt;
  fighter.velocity.x *= 0.88;

  // Vertical
  if (!fighter.isGrounded) {
    fighter.velocity.y -= GRAVITY * dt;
    fighter.position.y += fighter.velocity.y * dt;
    if (fighter.position.y <= 0) {
      fighter.position.y = 0;
      fighter.velocity.y = 0;
      fighter.isGrounded = true;
    }
  }

  // Arena bounds
  fighter.position.x = Math.max(-ARENA_WIDTH, Math.min(ARENA_WIDTH, fighter.position.x));

  // Update model
  fighter.model.root.position.x = fighter.position.x;
  fighter.model.root.position.y = fighter.position.y;
}

function pushApart(a, b) {
  const dx = b.position.x - a.position.x;
  const dist = Math.abs(dx);
  if (dist < PUSH_APART_DIST && dist > 0.01) {
    const overlap = (PUSH_APART_DIST - dist) / 2;
    const dir = dx > 0 ? 1 : -1;
    a.position.x -= dir * overlap;
    b.position.x += dir * overlap;
  }
}

function updateFacing(fighter, opponent) {
  const shouldFaceRight = opponent.position.x > fighter.position.x;
  fighter.facingRight = shouldFaceRight;
  fighter.model.root.rotation.y = shouldFaceRight ? Math.PI / 2 : -Math.PI / 2;
}

// ════════════════════════════════════════════
// PARTICLES
// ════════════════════════════════════════════

// Particle pool — pre-allocate materials to avoid GC on mobile
const particles = [];
const particleGeo = new THREE.SphereGeometry(0.04, 6, 4);
const _pVel = new THREE.Vector3(); // reusable temp vector
const PARTICLE_COUNT = isTouchDevice ? 6 : 12;

// Pre-allocate shared materials for common particle colors
const particleMats = {};
function getParticleMat(color) {
  if (!particleMats[color]) {
    particleMats[color] = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 });
  }
  return particleMats[color];
}

function spawnParticles(x, y, z, color) {
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    // Each particle needs its own material instance for independent opacity
    const mat = getParticleMat(color).clone();
    const mesh = new THREE.Mesh(particleGeo, mat);
    mesh.position.set(x, y, z);
    scene.add(mesh);
    particles.push({
      mesh,
      vx: (Math.random() - 0.5) * 6,
      vy: Math.random() * 4 + 1,
      vz: (Math.random() - 0.5) * 3,
      life: 0.4 + Math.random() * 0.3,
      maxLife: 0.4 + Math.random() * 0.3,
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    p.vy -= 12 * dt;
    p.mesh.position.x += p.vx * dt;
    p.mesh.position.y += p.vy * dt;
    p.mesh.position.z += p.vz * dt;
    const ratio = Math.max(0, p.life / p.maxLife);
    p.mesh.material.opacity = ratio;
    p.mesh.scale.setScalar(ratio);
    if (p.life <= 0) {
      scene.remove(p.mesh);
      p.mesh.material.dispose();
      particles.splice(i, 1);
    }
  }
}

// ════════════════════════════════════════════
// SCREEN SHAKE
// ════════════════════════════════════════════

const screenShake = { intensity: 0 };

function updateScreenShake(dt) {
  if (screenShake.intensity > 0.001) {
    camera.position.x += (Math.random() - 0.5) * screenShake.intensity;
    camera.position.y += (Math.random() - 0.5) * screenShake.intensity;
    screenShake.intensity *= Math.pow(0.01, dt);
  }
}

// ════════════════════════════════════════════
// SOUND SYSTEM
// ════════════════════════════════════════════

let audioCtx = null;
const punchBuffers = [];
const PUNCH_COUNT = 5;

// Background music
const bgMusic = new Audio('bgm.mp3');
bgMusic.loop = true;
bgMusic.volume = 0.4;
bgMusic.muted = true;                    // muted autoplay is allowed by browsers
bgMusic.play().catch(() => {});           // start playback immediately (silent)

// Pre-load and split punch sounds into 5 separate buffers
async function loadPunchSounds() {
  try {
    const resp = await fetch('punch.mp3');
    const arrayBuf = await resp.arrayBuffer();
    const fullBuffer = await audioCtx.decodeAudioData(arrayBuf);
    const segmentLength = Math.floor(fullBuffer.length / PUNCH_COUNT);
    const sampleRate = fullBuffer.sampleRate;
    const channels = fullBuffer.numberOfChannels;

    for (let i = 0; i < PUNCH_COUNT; i++) {
      const start = i * segmentLength;
      const end = i === PUNCH_COUNT - 1 ? fullBuffer.length : start + segmentLength;
      const len = end - start;
      const segBuf = audioCtx.createBuffer(channels, len, sampleRate);
      for (let ch = 0; ch < channels; ch++) {
        const src = fullBuffer.getChannelData(ch);
        const dst = segBuf.getChannelData(ch);
        for (let s = 0; s < len; s++) {
          dst[s] = src[start + s];
        }
      }
      punchBuffers.push(segBuf);
    }
  } catch (e) {
    console.warn('Could not load punch.mp3', e);
  }
}

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    loadPunchSounds();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  // Unmute and ensure music is playing
  bgMusic.muted = false;
  if (bgMusic.paused) {
    bgMusic.play().catch(() => {});
  }
}

function playPunchSample(pitchRate, volume) {
  if (!audioCtx || punchBuffers.length === 0) return;
  const buf = punchBuffers[Math.floor(Math.random() * punchBuffers.length)];
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.playbackRate.value = pitchRate;
  const gain = audioCtx.createGain();
  gain.gain.value = volume;
  src.connect(gain).connect(audioCtx.destination);
  src.start(0);
}

// Footstep system — noise buffer created once to avoid GC pressure on mobile
const footstepState = { player: 0, ai: 0 };
const FOOTSTEP_INTERVAL = 0.25;
let footstepNoiseBuf = null;

function initFootstepBuffer() {
  if (!audioCtx || footstepNoiseBuf) return;
  const bufSize = Math.floor(audioCtx.sampleRate * 0.06);
  footstepNoiseBuf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = footstepNoiseBuf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) {
    const env = (1 - i / bufSize);
    data[i] = (Math.random() * 2 - 1) * env * env;
  }
}

function playFootstep() {
  if (!audioCtx) return;
  if (!footstepNoiseBuf) initFootstepBuffer();
  const now = audioCtx.currentTime;

  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(80 + Math.random() * 40, now);
  osc.frequency.exponentialRampToValueAtTime(30, now + 0.08);
  const oscGain = audioCtx.createGain();
  oscGain.gain.setValueAtTime(0.5, now);
  oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
  osc.connect(oscGain);

  const noiseSrc = audioCtx.createBufferSource();
  noiseSrc.buffer = footstepNoiseBuf;
  const filt = audioCtx.createBiquadFilter();
  filt.type = 'lowpass';
  filt.frequency.value = 600;
  const noiseGain = audioCtx.createGain();
  noiseGain.gain.value = 0.35;
  noiseSrc.connect(filt).connect(noiseGain);

  const master = audioCtx.createGain();
  master.gain.value = 0.6;
  oscGain.connect(master);
  noiseGain.connect(master);
  master.connect(audioCtx.destination);

  osc.start(now); osc.stop(now + 0.1);
  noiseSrc.start(now); noiseSrc.stop(now + 0.06);
}

function updateFootsteps(fighter, key, dt) {
  const isMoving = Math.abs(fighter.velocity.x) > 1.0 && fighter.isGrounded && !fighter.anim.isAttacking;
  if (isMoving) {
    footstepState[key] += dt;
    if (footstepState[key] >= FOOTSTEP_INTERVAL) {
      footstepState[key] -= FOOTSTEP_INTERVAL;
      playFootstep();
    }
  } else {
    footstepState[key] = 0;
  }
}

function playSound(type) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;

  if (type === 'punchHit') {
    // Punch: higher pitch, slightly quieter
    playPunchSample(1.1 + Math.random() * 0.2, 0.7);
  }
  else if (type === 'kickHit') {
    // Kick: lower pitch, louder
    playPunchSample(0.75 + Math.random() * 0.1, 0.9);
  }
  else if (type === 'block') {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine'; osc.frequency.value = 1200;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.25, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.04);
  }
  else if (type === 'whoosh') {
    // Lighter whoosh using the punch sample at low volume, high pitch
    playPunchSample(2.0, 0.15);
  }
  else if (type === 'bell') {
    // Boxing ring bell: metallic clang with inharmonic overtones
    [3200, 4100, 5400].forEach((freq) => {
      const osc = audioCtx.createOscillator();
      osc.type = 'square'; osc.frequency.value = freq;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'bandpass'; filter.frequency.value = freq; filter.Q.value = 30;
      osc.connect(filter).connect(gain).connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.8);
    });
  }
  else if (type === 'victory') {
    [523, 659, 784].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      osc.type = 'triangle'; osc.frequency.value = freq;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.2, now + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.15 + 0.3);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now + i * 0.15); osc.stop(now + i * 0.15 + 0.3);
    });
  }
}

// ════════════════════════════════════════════
// HUD
// ════════════════════════════════════════════

const hudEl = {
  hud: document.getElementById('hud'),
  p1Health: document.getElementById('p1-health'),
  p2Health: document.getElementById('p2-health'),
  round: document.getElementById('round-display'),
  timer: document.getElementById('timer-display'),
  startScreen: document.getElementById('start-screen'),
  announcement: document.getElementById('announcement'),
  announceText: document.getElementById('announce-text'),
  announceSubtext: document.getElementById('announce-subtext'),
  gameOver: document.getElementById('game-over'),
  gameOverText: document.getElementById('game-over-text'),
  p1Dots: document.getElementById('p1-dots'),
  p2Dots: document.getElementById('p2-dots'),
};

function updateHUD(p1, p2) {
  const p1Pct = (p1.health / p1.maxHealth) * 100;
  const p2Pct = (p2.health / p2.maxHealth) * 100;
  hudEl.p1Health.style.width = p1Pct + '%';
  hudEl.p2Health.style.width = p2Pct + '%';

  // Color shift
  hudEl.p1Health.style.background = p1Pct > 50
    ? `linear-gradient(180deg, #4f4, #2a2)`
    : p1Pct > 25
      ? `linear-gradient(180deg, #ff4, #aa2)`
      : `linear-gradient(180deg, #f44, #a22)`;
  hudEl.p2Health.style.background = p2Pct > 50
    ? `linear-gradient(180deg, #f66, #a33)`
    : p2Pct > 25
      ? `linear-gradient(180deg, #ff4, #aa2)`
      : `linear-gradient(180deg, #f44, #a22)`;
}

function updateWinDots() {
  const p1Dots = hudEl.p1Dots.querySelectorAll('.win-dot');
  const p2Dots = hudEl.p2Dots.querySelectorAll('.win-dot');
  p1Dots.forEach((d, i) => d.classList.toggle('won', i < gameState.p1RoundWins));
  p2Dots.forEach((d, i) => d.classList.toggle('won', i < gameState.p2RoundWins));
}

function showAnnouncement(text, subtext, duration) {
  hudEl.announceText.textContent = text;
  hudEl.announceSubtext.textContent = subtext || '';
  hudEl.announcement.style.display = 'flex';
  if (duration > 0) {
    setTimeout(() => { hudEl.announcement.style.display = 'none'; }, duration * 1000);
  }
}

// ════════════════════════════════════════════
// GAME STATE MACHINE
// ════════════════════════════════════════════

const gameState = {
  current: 'MENU',
  roundNumber: 1,
  p1RoundWins: 0,
  p2RoundWins: 0,
  roundTimer: ROUND_TIME,
  stateTimer: 0,
};

let player, aiPlayer;
const playerModel = createStickman(0xeeeeee);
const aiModel = createStickman(0xcc3333);

function initFighters() {
  player = createFighter(playerModel, -4, true);
  aiPlayer = createFighter(aiModel, 4, false);
}

function resetFightersForRound() {
  player.health = 100;
  player.position.x = -4;
  player.position.y = 0;
  player.velocity.x = 0;
  player.velocity.y = 0;
  player.isGrounded = true;
  player.isBlocking = false;
  player.isStunned = false;
  player.anim = { currentAnim: 'idle', animTime: 0, isAttacking: false, hasHitThisSwing: false };

  aiPlayer.health = 100;
  aiPlayer.position.x = 4;
  aiPlayer.position.y = 0;
  aiPlayer.velocity.x = 0;
  aiPlayer.velocity.y = 0;
  aiPlayer.isGrounded = true;
  aiPlayer.isBlocking = false;
  aiPlayer.isStunned = false;
  aiPlayer.anim = { currentAnim: 'idle', animTime: 0, isAttacking: false, hasHitThisSwing: false };
  aiPlayer.aiState = 'IDLE';
  aiPlayer.aiTimer = 0;
  aiPlayer.aiDecisionTimer = 0;
  aiPlayer.aiBlockTimer = 0;
  aiPlayer.aiReactTimer = -1;

  gameState.roundTimer = ROUND_TIME;

  player.model.root.position.set(-4, 0, 0);
  aiPlayer.model.root.position.set(4, 0, 0);
  player.model.root.rotation.y = Math.PI / 2;    // face right
  aiPlayer.model.root.rotation.y = -Math.PI / 2;  // face left
  player.model.parts.hips.position.y = 0.95;
  aiPlayer.model.parts.hips.position.y = 0.95;
}

function changeState(newState) {
  gameState.current = newState;
  gameState.stateTimer = 0;
  if (newState === 'ROUND_INTRO' || newState === 'FIGHTING') {
    bgMusic.volume = 0.12;
  } else if (newState === 'GAME_OVER') {
    bgMusic.volume = 0.4;
  }
}

function handleEnter() {
  ensureAudio();
  if (gameState.current === 'MENU') {
    initFighters();
    gameState.roundNumber = 1;
    gameState.p1RoundWins = 0;
    gameState.p2RoundWins = 0;
    hudEl.startScreen.style.display = 'none';
    hudEl.hud.style.display = 'block';
    hudEl.gameOver.style.display = 'none';
    updateWinDots();
    changeState('ROUND_INTRO');
  } else if (gameState.current === 'GAME_OVER') {
    hudEl.gameOver.style.display = 'none';
    gameState.roundNumber = 1;
    gameState.p1RoundWins = 0;
    gameState.p2RoundWins = 0;
    updateWinDots();
    changeState('ROUND_INTRO');
  }
}

window.addEventListener('keydown', e => {
  ensureAudio();
  if (e.code === 'Enter') handleEnter();
});

// Unmute music on first real user interaction (click/tap/key)
['click', 'pointerdown', 'touchstart'].forEach(evt => {
  window.addEventListener(evt, () => ensureAudio(), { once: true });
});

// ════════════════════════════════════════════
// CAMERA
// ════════════════════════════════════════════

const cameraTarget = { x: 0, y: 2.8, z: 11 };

function updateCamera(p1, p2, dt) {
  const midX = (p1.position.x + p2.position.x) / 2;
  const dist = Math.abs(p1.position.x - p2.position.x);

  // Calculate min Z to keep both fighters in frame on any aspect ratio
  const halfFovRad = (camera.fov / 2) * Math.PI / 180;
  const hHalfFov = Math.atan(Math.tan(halfFovRad) * camera.aspect);
  const neededHalfWidth = dist / 2 + 1.5;
  const minZ = neededHalfWidth / Math.tan(hHalfFov);
  const targetZ = Math.max(minZ, 10 + dist * 0.3);

  cameraTarget.x = midX;
  cameraTarget.z = targetZ;

  camera.position.x += (cameraTarget.x - camera.position.x) * 3 * dt;
  camera.position.y += (cameraTarget.y - camera.position.y) * 3 * dt;
  camera.position.z += (cameraTarget.z - camera.position.z) * 3 * dt;
  camera.lookAt(midX, 1.8, 0);
}

// ════════════════════════════════════════════
// MAIN GAME LOOP
// ════════════════════════════════════════════

let lastTime = 0;

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  gameState.stateTimer += dt;

  switch (gameState.current) {
    case 'MENU':
      // Idle animation on menu models (if visible)
      break;

    case 'ROUND_INTRO':
      if (gameState.stateTimer <= dt + 0.001) {
        // First frame of intro — reset once
        resetFightersForRound();
        hudEl.round.textContent = `ROUND ${gameState.roundNumber}`;
        hudEl.timer.textContent = ROUND_TIME;
        showAnnouncement(`ROUND ${gameState.roundNumber}`, '', 1.2);
        updateHUD(player, aiPlayer);
      }
      updateAnimation(player, dt);
      updateAnimation(aiPlayer, dt);
      if (gameState.stateTimer >= 1.5) {
        showAnnouncement('FIGHT!', '', 0.8);
        changeState('FIGHTING');
      }
      break;

    case 'FIGHTING':
      updatePlayerInput(player);
      updateAI(aiPlayer, player, dt);

      updatePhysics(player, dt);
      updatePhysics(aiPlayer, dt);
      pushApart(player, aiPlayer);

      updateFacing(player, aiPlayer);
      updateFacing(aiPlayer, player);

      if (player.anim.isAttacking) checkHit(player, aiPlayer);
      if (aiPlayer.anim.isAttacking) checkHit(aiPlayer, player);

      updateAnimation(player, dt);
      updateAnimation(aiPlayer, dt);
      updateFootsteps(player, 'player', dt);
      updateFootsteps(aiPlayer, 'ai', dt);

      updateParticles(dt);
      updateCamera(player, aiPlayer, dt);
      updateScreenShake(dt);

      updateHUD(player, aiPlayer);

      // Timer
      gameState.roundTimer -= dt;
      hudEl.timer.textContent = Math.max(0, Math.ceil(gameState.roundTimer));

      // Check round end
      if (player.health <= 0 || aiPlayer.health <= 0) {
        changeState('ROUND_END');
        const winner = player.health > 0 ? 'player' : 'ai';
        showAnnouncement('K.O.!', winner === 'player' ? 'Player wins the round!' : 'CPU wins the round!', 2);
        if (winner === 'player') {
          player.anim.currentAnim = 'victory';
          aiPlayer.anim.currentAnim = 'defeat';
          gameState.p1RoundWins++;
        } else {
          aiPlayer.anim.currentAnim = 'victory';
          player.anim.currentAnim = 'defeat';
          gameState.p2RoundWins++;
        }
        updateWinDots();
      } else if (gameState.roundTimer <= 0) {
        changeState('ROUND_END');
        const winner = player.health >= aiPlayer.health ? 'player' : 'ai';
        showAnnouncement("TIME'S UP!", winner === 'player' ? 'Player wins the round!' : 'CPU wins the round!', 2);
        if (winner === 'player') {
          player.anim.currentAnim = 'victory';
          aiPlayer.anim.currentAnim = 'defeat';
          gameState.p1RoundWins++;
        } else {
          aiPlayer.anim.currentAnim = 'victory';
          player.anim.currentAnim = 'defeat';
          gameState.p2RoundWins++;
        }
        updateWinDots();
      }
      break;

    case 'ROUND_END':
      updateAnimation(player, dt);
      updateAnimation(aiPlayer, dt);
      updateParticles(dt);
      updateCamera(player, aiPlayer, dt);

      if (gameState.stateTimer > 2.5) {
        if (gameState.p1RoundWins >= ROUNDS_TO_WIN) {
          changeState('GAME_OVER');
          hudEl.gameOverText.textContent = 'YOU WIN!';
          hudEl.gameOverText.className = 'result win';
          hudEl.gameOver.style.display = 'flex';
          playSound('victory');
        } else if (gameState.p2RoundWins >= ROUNDS_TO_WIN) {
          changeState('GAME_OVER');
          hudEl.gameOverText.textContent = 'YOU LOSE';
          hudEl.gameOverText.className = 'result lose';
          hudEl.gameOver.style.display = 'flex';
        } else {
          gameState.roundNumber++;
          changeState('ROUND_INTRO');
        }
      }
      break;

    case 'GAME_OVER':
      updateAnimation(player, dt);
      updateAnimation(aiPlayer, dt);
      updateCamera(player, aiPlayer, dt);
      break;
  }

  renderer.render(scene, camera);
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

</script>
